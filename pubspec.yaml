name: pos_offline_desktop
description: "A new Flutter project."

publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2
  package_info_plus: ^8.3.0
  open_file_plus: ^3.4.1+1
  gap: ^3.0.1
  path_provider: ^2.1.5
  path: ^1.9.1
  excel: ^4.0.6
  permission_handler: ^12.0.0+1
  file_picker: ^10.1.2
  number_to_words: ^1.0.0
  go_router: ^16.0.0
  flutter_svg: ^2.2.0

  cupertino_icons: ^1.0.8

  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^7.2.1

  desktop_window: ^0.4.2

  drift: ^2.26.0
  drift_flutter: ^0.2.4

  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  shared_preferences: ^2.3.2
  http: ^1.6.0
  mobile_scanner: ^5.2.3
  uuid: ^4.5.1
  
  # Security & Encryption
  crypto: ^3.0.3
  encrypt: ^5.0.3
  
  # Device Information
  device_info_plus: ^9.1.2
  platform_device_id: ^1.0.1
  
  # Secure Storage
  flutter_secure_storage: ^9.2.2
  
  # Firebase for Activation
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.0
  firebase_auth: ^5.4.1
  firebase_storage: ^12.4.1

  # Dio for HTTP requests
  dio: ^5.4.0

  # State Management (if not exists)
  get: ^4.6.6
  
  # Additional dependencies for new features
  provider: ^6.1.2
  collection: ^1.19.0
  archive: ^3.6.1
  
  # Admin Dashboard Charts
  fl_chart: ^0.69.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.26.0
  build_runner: ^2.4.15

  flutter_lints: ^6.0.0
  test: ^1.26.2
  integration_test:
    sdk: flutter


flutter: 
  uses-material-design: true
  generate: true

  assets:
    - assets/logo/
    - assets/recipt/
    - assets/recipt/recipt_logo.png
    - assets/svg/

  fonts:
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
    - family: DejaVuSans
      fonts:
        - asset: assets/fonts/DejaVuSans.ttf
    
  

dependency_overrides:
  sqlite3: 2.4.0